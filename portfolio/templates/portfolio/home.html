{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Career Canvas - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <style>
        /* Apply background image */
        body {
            
            color: rgb(16, 15, 15);  /* Ensure text is visible */
            height: 100vh;
            margin: 0;
            position: relative;
        }

        

        .container {
            background-color: rgba(255, 255, 255, 0.9);
            position: relative;
            text-align: center;
            margin-top: 150px;
            z-index: 2;
        }

        body {
            background: url('{% static "portfolio/images/viewsport.jpg" %}') no-repeat center center fixed;
            background-size: cover;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.341);
            padding: 80px;
            border-radius: 15px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
        }

        .heading {
            font-size: 40px;
            font-weight: bold;
        }

        .buttons-container {
            margin-top: 30px;
        }

        .btn-custom {
            width: 200px;
            font-size: 18px;
            padding: 10px;
            margin: 10px;
        }

        .footer {
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            z-index: 3;
        }
    </style>
</head>
<body>



    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Career Canvas</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="profileDropdown" role="button" data-bs-toggle="dropdown">
                            Profile
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item text-danger" href="{% url 'logout' %}">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="heading">Career Canvas</div>

        <div class="buttons-container">
            <!-- Employee Button Redirects to Dashboard -->
            <a href="{% url 'dashboard' %}" class="btn btn-primary btn-custom">Employee</a>
            <a href="{% url 'company_list' %}" class="btn btn-success btn-custom">Company</a>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <a href="#" onclick="showFeedbackForm()" class="text-light me-3">Feedback</a>
        <a href="{% url 'home' %}" class="text-light me-3">Home</a>
        <a href="{% url 'about_us' %}" class="text-light">About Us</a>
    </div>

    <!-- Feedback Form (Modal) -->
    <div id="feedbackForm" class="modal fade" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Submit Feedback</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form method="POST" action="{% url 'feedback' %}">
                        {% csrf_token %}
                        <textarea class="form-control" name="message" rows="4" placeholder="Enter your feedback" required></textarea>
                        <div class="modal-footer">
                            <button type="submit" class="btn btn-primary">Submit</button>
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showFeedbackForm() {
            var feedbackModal = new bootstrap.Modal(document.getElementById('feedbackForm'));
            feedbackModal.show();
        }
    </script>

</body>
</html>
